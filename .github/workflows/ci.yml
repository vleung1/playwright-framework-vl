name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow manual trigger for full regression
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Target environment (prod, qa, stage, qa2)'
        required: false
        default: 'prod'

env:
  NODE_VERSION: '20'
  TEST_ENV: ${{ github.event.inputs.test_env || 'prod' }}

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

  smoke-tests:
    name: Smoke Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          CI: 'true'

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 14

  crdc-regression:
    name: CRDC Hub Regression
    needs: lint-and-typecheck
    # Run on push to main, or on manual dispatch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run CRDC Hub tests
        run: npm run test:crdc
        env:
          CI: 'true'
          TEST_ENV: ${{ env.TEST_ENV }}

      - name: Upload CRDC regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crdc-regression-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crdc-test-results
          path: test-results/
          retention-days: 30
